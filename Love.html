<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff6b9d, #c44569, #6c5ce7, #ff7675);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
    font-family: 'Georgia', serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Splash Screen */
  .splash {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    animation: fadeOut 1s ease 5s forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
  }

  .love-text {
    font-size: 5rem;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
    letter-spacing: 5px;
    opacity: 0;
    animation: popIn 1.5s ease forwards, pulse 1.5s ease-in-out 1.5s infinite;
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* Main Content */
  .main {
    text-align: center;
    color: white;
    z-index: 1;
  }

  .main h1 {
    font-size: 4rem;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
    animation: floatUp 3s ease-in-out infinite;
  }

  .main p {
    font-size: 1.5rem;
    margin-top: 20px;
    font-style: italic;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* Floating Hearts */
  .heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 2rem;
    animation: floatHeart linear infinite;
    opacity: 0.8;
  }

  @keyframes floatHeart {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
  }
</style>
</head>
<body>

  <!-- Splash Screen -->
  <div class="splash">
    <div class="love-text">I ❤️ LOVE YOU 😘</div>
  </div>

  <!-- Main Page -->
  <div class="main">
    <h1>Forever Yours 💖</h1>
    <p>"You are my today and all of my tomorrows."</p>
  </div>

  <script>
    // Generate floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = ['❤️','💖','💕','💘','💞'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
      heart.style.fontSize = (Math.random() * 2 + 1) + 'rem';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createHeart, 300);
  </script>

</body>
</html>
